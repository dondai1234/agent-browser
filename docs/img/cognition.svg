<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <rect width="880" height="420" fill="#0F0820"/>
  <defs>
    <linearGradient id="lay" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1A0F33"/>
      <stop offset="1" stop-color="#0F0820"/>
    </linearGradient>
  </defs>

  <text x="440" y="44" text-anchor="middle" fill="#F5E8FF" font-size="21" font-weight="700">A cognition layer over a token-efficient engine</text>
  <text x="440" y="68" text-anchor="middle" fill="#A78BFA" font-size="13">the agent spends tokens on the task, not on interpreting the page</text>

  <!-- Cognition layer -->
  <rect x="80" y="108" width="720" height="78" rx="14" fill="url(#lay)" stroke="#FF2D95" stroke-width="2"/>
  <text x="100" y="134" fill="#FF2D95" font-size="13" font-weight="700" letter-spacing="1.5">COGNITION</text>
  <text x="100" y="160" fill="#F5E8FF" font-size="15" font-weight="600">act</text>
  <text x="150" y="160" fill="#A78BFA" font-size="12">intent-first</text>
  <text x="245" y="160" fill="#F5E8FF" font-size="15" font-weight="600">verdict</text>
  <text x="315" y="160" fill="#A78BFA" font-size="12">did it work?</text>
  <text x="420" y="160" fill="#F5E8FF" font-size="15" font-weight="600">see</text>
  <text x="455" y="160" fill="#A78BFA" font-size="12">page brief</text>
  <text x="545" y="160" fill="#F5E8FF" font-size="15" font-weight="600">extract</text>
  <text x="615" y="160" fill="#A78BFA" font-size="12">JSON, not refs</text>
  <text x="730" y="160" fill="#F5E8FF" font-size="15" font-weight="600">history</text>
  <text x="100" y="178" fill="#A78BFA" font-size="11">local heuristics resolve a named control, act on it, report what changed — no LLM, no per-call cost</text>

  <!-- Engine layer -->
  <rect x="80" y="206" width="720" height="78" rx="14" fill="url(#lay)" stroke="#2DD4BF" stroke-width="2"/>
  <text x="100" y="232" fill="#2DD4BF" font-size="13" font-weight="700" letter-spacing="1.5">ENGINE</text>
  <text x="100" y="258" fill="#F5E8FF" font-size="15" font-weight="600">dense ref snapshots</text>
  <text x="310" y="258" fill="#F5E8FF" font-size="15" font-weight="600">per-action delta</text>
  <text x="500" y="258" fill="#F5E8FF" font-size="15" font-weight="600">structured JSON</text>
  <text x="100" y="276" fill="#A78BFA" font-size="11">refs are stable across re-renders (backend-keyed), action log offloaded from the agent's context window</text>

  <!-- chromedp layer -->
  <rect x="80" y="304" width="720" height="64" rx="14" fill="url(#lay)" stroke="#8B5CF6" stroke-width="2"/>
  <text x="100" y="330" fill="#8B5CF6" font-size="13" font-weight="700" letter-spacing="1.5">RUNTIME</text>
  <text x="100" y="354" fill="#F5E8FF" font-size="15" font-weight="600">chromedp</text>
  <text x="200" y="354" fill="#A78BFA" font-size="12">real Chrome — one Go binary, no Playwright, no Puppeteer, no Node</text>

  <text x="440" y="402" text-anchor="middle" fill="#A78BFA" font-size="11">v2 is additive — v1's by-ref tools (click / fill / select / hover / press_key) are all still there</text>
</svg>
