name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: build binaries (static, cross-platform)
        run: |
          mkdir -p dist
          for tgt in "windows/amd64" "linux/amd64" "linux/arm64" "darwin/amd64" "darwin/arm64"; do
            os=${tgt%/*}; arch=${tgt#*/}
            ext=""; [ "$os" = "windows" ] && ext=".exe"
            GOOS=$os GOARCH=$arch CGO_ENABLED=0 go build -trimpath -ldflags "-s -w -X main.version=${GITHUB_REF_NAME}" \
              -o "dist/agent-browser-${os}-${arch}${ext}" ./cmd/agent-browser
          done
          ls -la dist
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
